prometheus:
  prometheusSpec:
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false

    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi

    retention: ""
    retentionSize: 40GB

    %{ if prometheus_resources != null }
    resources: ${ jsonencode(prometheus_resources) }
    %{ endif }

    %{ if priority_class != null }
    priorityClassName: ${priority_class}
    %{ endif }

    %{ if gke_mode }
    nodeSelector:
      cloud.google.com/gke-provisioning: standard
    %{ endif }

grafana:
  adminUser: "admin"
  adminPassword: ${admin_password}

  deploymentStrategy:
    type: Recreate

  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
      kubernetes.io/ingress.class: nginx
    hosts:
      - ${domain}
    tls:
      - hosts:
          - ${domain}
        secretName: grafana-tls

  persistence:
    enabled: true
    size: 10Gi

  %{ if loki_enabled }
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      access: proxy
      url: http://kube-loki-stack.kube-loki-stack:3100
      version: 1
      jsonData:
        maxLines: 1000
  %{ endif }

kube-state-metrics:
  enabled: true

  %{ if priority_class != null }
  priorityClassName: ${priority_class}
  %{ endif }

  %{ if gke_mode }
  metricLabelsAllowlist:
    - nodes=[cloud.google.com/gke-nodepool,topology.kubernetes.io/region,topology.kubernetes.io/zone]

  nodeSelector:
    cloud.google.com/gke-provisioning: standard
  %{ endif }