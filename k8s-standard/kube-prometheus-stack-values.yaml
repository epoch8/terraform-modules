prometheus:
  prometheusSpec:
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false

    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi

    %{ if prometheus_resources != null }
    resources: ${ jsonencode(prometheus_resources) }
    %{ endif }

grafana:
  adminUser: "admin"
  adminPassword: ${admin_password}

  deploymentStrategy:
    type: Recreate

  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
      kubernetes.io/ingress.class: nginx
    hosts:
      - ${domain}
    tls:
      - hosts:
          - ${domain}
        secretName: grafana-tls

  persistence:
    enabled: true
    size: 10Gi

%{ if loki_enabled }
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      access: proxy
      url: http://kube-loki-stack.kube-loki-stack:3100
      version: 1
      jsonData:
        maxLines: 1000
%{ endif }