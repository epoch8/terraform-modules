nameOverride: "${name}"
fullnameOverride: "${name}"

domain: "${ingress_host}"

image:
  repository: nocodb/nocodb
  tag: "0.109.7"

env:
%{ if !use_sqlite }
  - name: NC_DB_JSON_FILE
    value: /configs/conn.json
%{ endif }

  - name: NC_ADMIN_EMAIL
    value: "${admin_email}"
  - name: NC_ADMIN_PASSWORD
    value: "${admin_password}"

%{ if !use_sqlite }
configs:
  - name: conn.json
    value: |
      {
        "client": "pg",
        "connection": {
          "host": "${db_host}",
          "port": "${db_port}",
          "user": "${db_username}",
          "password": "${db_password}",
          "database": "${db_dbname}",
          "ssl": {
            "rejectUnauthorized": false,
            "ca": "-",
            "key": "",
            "cert": ""
          }
        }
      }
%{ endif }

%{ if use_sqlite }
volumes:
  - name: data
    size: 1Gi
    mountPath: /usr/app/data/
%{ endif }

# Port that container is using
port: 8080

probe:
  httpGet:
    path: /dashboard/

ingress:
  enabled: true

  nginx: true

  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt
    nginx.ingress.kubernetes.io/proxy-body-size: 16m
  tls:
   - secretName: ${ingress_host}
     hosts:
       - ${ingress_host}

resources:
  limits:
    cpu: 1
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 512Mi

serviceAccount:
  create: false

livenessProbe:
  failureThreshold: 10
